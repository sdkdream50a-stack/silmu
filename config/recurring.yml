# Solid Queue recurring jobs (Rails 8)
# SEO 모니터링 자동화

# 매주 월요일 오전 9시 - SEO 주간 리포트
weekly_seo_report:
  class: SeoReportJob
  args: ["weekly"]
  schedule: "0 9 * * 1" # 매주 월요일 9시

# 매월 1일 오전 10시 - PageSpeed 월간 리포트
monthly_performance_report:
  class: SeoReportJob
  args: ["monthly"]
  schedule: "0 10 1 * *" # 매월 1일 10시

# 매주 수요일 오후 3시 - 깨진 링크 체크
weekly_link_check:
  class: SeoReportJob
  args: ["links"]
  schedule: "0 15 * * 3" # 매주 수요일 15시

# 매일 오전 6시 - 사이트맵 핑 (IndexNow + Google)
daily_sitemap_ping:
  class: SitemapPingJob
  schedule: "0 6 * * *" # 매일 06시

# 2026-05-18: GoogleSitemapPingJob 무한 루프 사건으로 cron 비활성화
# Google Sitemap Ping API 2024년 폐지 → cron 자체가 무의미. SitemapPingJob과의 재귀로 폭주 유발
# evening_google_ping:
#   class: GoogleSitemapPingJob
#   schedule: "0 18 * * *"

# 법령 정합성 자동 검증 (잠정 중단 2026-04-13)

# # 매주 월요일 오전 10시 - 법령 주간 검증
# weekly_legal_check:
#   class: LegalComplianceJob
#   args: ["check"]
#   schedule: "0 10 * * 1" # 매주 월요일 10시

# # 매월 1일, 15일 오전 11시 - AI 심층 검증 (격주 1회)
# biweekly_legal_deep_check:
#   class: LegalComplianceJob
#   args: ["deep_check"]
#   schedule: "0 11 1,15 * *" # 매월 1일, 15일 11시 (격주)

# 매주 화요일 오전 7시 - 법제처 API 법령 메타데이터 동기화
weekly_law_sync:
  class: LawSyncJob
  schedule: "0 7 * * 2" # 매주 화요일 7시

# 매일 오전 8시 - 인사혁신처 보도자료 RSS 모니터링 (2026-05-17 신설)
# 봉급·수당·여비·보수지침 키워드 매칭 시 Sentry warning 알림
# 매년 1~2월 일괄 개정 감지로 silmu 콘텐츠 갱신 사이클 누락 방지
daily_mpm_rss_monitor:
  class: MpmRssMonitorJob
  schedule: "0 8 * * *" # 매일 08시 KST

# 매주 일요일 오전 6시 - AEO 인용 측정 (2026-05-17 신설)
# Claude haiku에 silmu 핵심 쿼리 10개 → silmu.kr 인용 여부 측정
# 인용률 0% 시 Sentry warning, 추이 변화 추적
weekly_aeo_citation_monitor:
  class: AeoCitationMonitorJob
  schedule: "0 6 * * 0" # 매주 일요일 06시 KST


# 매일 오전 7시 - SEO 자동 진단 (2026-05-18 신설)
# sitemap URL count, thin content 비율, core 페이지 HTTP, IndexNow 송신 카운트
# 결과는 log/seo_health.jsonl에 영구 기록 → 일별 추이 추적 가능
daily_seo_health:
  class: SeoHealthJob
  schedule: "0 7 * * *" # 매일 07시 KST

# exam.silmu.kr 학습 리마인더 (3일 미접속 유저)
daily_exam_reminder:
  class: ExamReminderJob
  schedule: "0 10 * * *" # 매일 오전 10시 (KST)

# 주간 뉴스레터 (newsletter_agreed: true 유저 대상)
weekly_newsletter:
  class: WeeklyNewsletterJob
  args: []
  schedule: "0 0 * * 1" # 매주 월요일 00:00 UTC = 09:00 KST

# Solid Queue finished jobs 자동 정리 (clear_finished_jobs_after = 1.day, default)
# 누락 시 finished 잡이 무한 누적 → 디스크 점유 (실측 사례: 9,900만 건 / 76 GB)
clear_solid_queue_finished_jobs:
  command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
  schedule: "12 18 * * *" # 매일 UTC 18:12 = KST 03:12
